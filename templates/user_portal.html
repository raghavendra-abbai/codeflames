<!DOCTYPE html>
<html>

<head>
<title>User Portal</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
text-align:center;
width:260px;
}

button{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
background:#2f6fed;
color:white;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div class="container">

<h2>User Portal</h2>

<a href="/farmer_register">
<button>Farmer Register</button>
</a>

<a href="/farmer_login">
<button>Farmer Login</button>
</a>

<a href="/consumer_register">
<button>Consumer Register</button>
</a>

<a href="/consumer_login">
<button>Consumer Login</button>
</a>

</div>

</body>

</html>
