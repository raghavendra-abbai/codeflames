<!DOCTYPE html>
<html>
<head>
<title>View Farmer Crops</title>
</head>

<body>

<h1>Farmer Uploaded Crops</h1>

<table border="1">

<tr>
<th>ID</th>
<th>Crop</th>
<th>Price</th>
<th>Image</th>
<th>Status</th>
</tr>

{% for crop in crops %}

<tr>

<td>{{ crop.id }}</td>

<td>{{ crop.crop_name }}</td>

<td>₹{{ crop.price }}</td>

<td>
<img src="{{ url_for('static', filename='uploads/' + crop.image) }}" width="80">
</td>

<td>{{ crop.status }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
