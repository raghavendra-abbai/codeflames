<!DOCTYPE html>
<html>
<head>

<title>Consumer Marketplace</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/consumer.css') }}">

</head>

<body>

<h1 class="title">Fresh Crops Marketplace</h1>

<div class="container">

{% for crop in crops %}

<div class="card">

<img src="/static/uploads/{{crop.image}}" alt="crop">

<h2>{{crop.crop_name}}</h2>

<p class="price">₹{{crop.price}}</p>

<button class="buy">Buy Now</button>

</div>

{% endfor %}

</div>

</body>
</html>
