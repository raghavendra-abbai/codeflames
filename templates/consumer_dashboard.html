<!DOCTYPE html>
<html>
<head>

<title>Consumer Marketplace</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/consumer.css') }}">

</head>

<body>
<form method="GET" action="/consumer_dashboard" class="search-box">

<input type="text" name="search" placeholder="Search crops...">

<button type="submit">Search</button>

</form>

<h1>Fresh Crops Marketplace</h1>


<div class="crop-container">

{% for crop in crops %}

<div class="crop-card">

<img src="{{ url_for('static', filename='uploads/' + crop.image) }}" class="crop-image">

<h3>{{ crop.crop_name }}</h3>

<p>₹{{ crop.price }}</p>

<a href="/buy_crop/{{ crop.id }}">
<button class="buy-btn">Buy Now</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
